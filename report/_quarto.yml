project:
  type: website
  output-dir: _site

website:
  title: "COVID-19 Data Analysis"
  description: "Cross-country COVID-19 case analysis — Czechia in context"
  navbar:
    right:
      - text: "Live dashboard"
        href: https://covid-czechia.streamlit.app
